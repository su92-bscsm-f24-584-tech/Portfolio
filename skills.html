<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills | Portfolio</title>

<style>

body{
    margin:0;
    color:white;
    font-family:Arial;
    overflow-x:hidden;
    position:relative;
}

/* ================= BACKGROUND ================= */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.85)),
    url("skill.png");   /* change image here */

    background-size:cover;
    background-position:center;
    filter:blur(2px);
    transform:scale(1.05);
    z-index:-2;
}

/* ================= HEADER ================= */
.hero{
    text-align:center;
    padding:80px 20px 30px;
}

.hero h1{
    font-size:3.5rem;
    background:linear-gradient(135deg,#ff7a00,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#aaa;
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

/* ================= ADD SKILL BOX ================= */
.add-box{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:30px auto;
    flex-wrap:wrap;
}

input, select{
    padding:10px 12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,.08);
    color:white;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff7a00;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

/* ================= SECTION ================= */
.section-title{
    margin:40px 10%;
    font-size:1.3rem;
    color:#ff7a00;
    border-left:4px solid #ff7a00;
    padding-left:10px;
}

/* ================= GRID ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    padding:0 10%;
}

/* ================= CARD ================= */
.card{
    background:rgba(20,20,20,.55);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:18px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#ff7a00;
    box-shadow:0 0 25px rgba(255,122,0,.25);
}

.card h3{
    margin:0 0 10px;
    color:#ff7a00;
}

.tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.tag{
    font-size:.8rem;
    padding:6px 10px;
    border-radius:20px;
    background:rgba(255,122,0,.12);
    border:1px solid rgba(255,122,0,.2);
}

/* ================= BACK BUTTON ================= */
.back{
    display:block;
    text-align:center;
    margin:50px;
    color:#ff7a00;
    text-decoration:none;
    font-size:1.1rem;
}

.back:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="hero">
    <h1>TECHNICAL SKILLS</h1>
    <p>AI, DevOps, Cloud, Programming, Marketing & Modern Software Engineering Skills</p>
</div>

</div>

<!-- ================= SECTIONS ================= -->

<div class="section-title">AI & Machine Learning</div>
<div class="grid" id="ai"></div>

<div class="section-title">DevOps & Cloud</div>
<div class="grid" id="devops"></div>

<div class="section-title">Programming</div>
<div class="grid" id="prog"></div>

<div class="section-title">Databases</div>
<div class="grid" id="db"></div>

<div class="section-title">Marketing & Business</div>
<div class="grid" id="mkt"></div>

<a class="back" href="index.html">? Back to Portfolio</a>

<script>

const skills = [
    {name:"PyTorch", cat:"AI & ML"},
    {name:"TensorFlow", cat:"AI & ML"},
    {name:"BERT / NLP", cat:"AI & ML"},
    {name:"RAG Systems", cat:"AI & ML"},

    {name:"Docker", cat:"DevOps & Cloud"},
    {name:"Kubernetes", cat:"DevOps & Cloud"},
    {name:"Terraform", cat:"DevOps & Cloud"},
    {name:"AWS", cat:"DevOps & Cloud"},
    {name:"CI/CD", cat:"DevOps & Cloud"},

    {name:"Python", cat:"Programming"},
    {name:"C++", cat:"Programming"},
    {name:"HTML", cat:"Markup"},
    {name:"YAML", cat:"Markup"},
    {name:"Assembly", cat:"Programming"},

    {name:"MySQL", cat:"Databases"},
    {name:"PostgreSQL", cat:"Databases"},

    {name:"Shopify", cat:"Marketing"},
    {name:"Digital Marketing", cat:"Marketing"},
    {name:"SEO", cat:"Marketing"}
];

function render(){
    document.getElementById("ai").innerHTML = "";
    document.getElementById("devops").innerHTML = "";
    document.getElementById("prog").innerHTML = "";
    document.getElementById("db").innerHTML = "";
    document.getElementById("mkt").innerHTML = "";

    skills.forEach(s=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML = `
            <h3>${s.name}</h3>
            <div class="tags">
                <div class="tag">${s.cat}</div>
            </div>
        `;

        if(s.cat=="AI & ML") document.getElementById("ai").appendChild(card);
        if(s.cat=="DevOps & Cloud") document.getElementById("devops").appendChild(card);
        if(s.cat=="Programming") document.getElementById("prog").appendChild(card);
        if(s.cat=="Databases") document.getElementById("db").appendChild(card);
        if(s.cat=="Marketing") document.getElementById("mkt").appendChild(card);
    });
}

function addSkill(){
    const name = document.getElementById("skillName").value;
    const cat = document.getElementById("category").value;

    if(!name) return;

    skills.push({name, cat});
    render();

    document.getElementById("skillName").value="";
}

render();

</script>

</body>
</html>
